<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金实时行情监控</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --card-bg-light: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --up-color: #f23645;
            --down-color: #089981;
            --border-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* 伦敦金横幅样式 */
        .global-market {
            background-color: var(--card-bg-light);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #f5a623;
        }

        .global-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .global-name {
            font-size: 16px;
            font-weight: 600;
        }

        .global-data {
            text-align: right;
        }

        .lg-price {
            font-size: 20px;
            font-weight: bold;
            margin-right: 8px;
        }

        .lg-change {
            font-size: 14px;
        }

        /* 浙商金样式 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }

        .update-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .price-display {
            display: flex;
            align-items: baseline;
            margin-bottom: 24px;
        }

        .current-price {
            font-size: 48px;
            font-weight: bold;
            margin-right: 16px;
        }

        .price-change {
            font-size: 18px;
            font-weight: 500;
        }

        .up { color: var(--up-color); }
        .down { color: var(--down-color); }
        .neutral { color: var(--text-main); }

        .grid-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .info-label { color: var(--text-muted); }

        .calculator {
            background-color: var(--card-bg-light);
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .calc-title {
            font-size: 16px;
            margin: 0 0 12px 0;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        input {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }

        input:focus { border-color: var(--text-muted); }

        .pnl-details {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px dashed var(--border-color);
            font-size: 14px;
            color: var(--text-muted);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .pnl-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .pnl-value {
            font-size: 24px;
            font-weight: bold;
        }

        .status-bar {
            text-align: right;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 16px;
        }

        /* 移动端优化适配 */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .dashboard { padding: 16px; }
            .header h1 { font-size: 18px; }
            .current-price { font-size: 36px; margin-right: 12px; }
            .price-change { font-size: 14px; }
            .input-group { flex-direction: column; gap: 10px; }
            .grid-info { gap: 12px; font-size: 13px; }
            .global-market { flex-direction: column; align-items: flex-start; gap: 8px; }
            .global-data { text-align: left; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="global-market">
        <div>
            <div class="global-title">国际大盘参考</div>
            <div class="global-name" id="lgName">伦敦金</div>
        </div>
        <div class="global-data">
            <span class="lg-price neutral" id="lgPrice">--</span>
            <span class="lg-change neutral" id="lgChange">-- (--%)</span>
        </div>
    </div>

    <div class="header">
        <h1>浙商银行积存金 (JCJ)</h1>
        <div class="update-time" id="updateTime">正在获取数据...</div>
    </div>

    <div class="price-display">
        <div class="current-price neutral" id="currentPrice">--</div>
        <div class="price-change neutral" id="priceChange">-- (--%)</div>
    </div>

    <div class="grid-info">
        <div class="info-item"><span class="info-label">开盘价</span><span id="openPrice">--</span></div>
        <div class="info-item"><span class="info-label">最高价</span><span id="highPrice">--</span></div>
        <div class="info-item"><span class="info-label">前收盘</span><span id="prevClose">--</span></div>
        <div class="info-item"><span class="info-label">最低价</span><span id="lowPrice">--</span></div>
    </div>

    <div class="calculator">
        <h3 class="calc-title">持仓盈亏试算</h3>
        <div class="input-group">
            <input type="number" id="buyPrice" placeholder="买入均价 (元/克)" step="0.01" oninput="calculatePnL()">
            <input type="number" id="holdAmount" placeholder="持仓数量 (克)" step="0.01" oninput="calculatePnL()">
        </div>
        
        <div class="pnl-details">
            <div class="detail-row">
                <span>表面浮动盈亏</span>
                <span id="grossPnl" class="neutral">0.00</span>
            </div>
            <div class="detail-row">
                <span>预估卖出手续费 (0.4%)</span>
                <span id="feeValue" class="neutral">0.00</span>
            </div>
        </div>

        <div class="pnl-result">
            <span>最终净盈亏 (元)</span>
            <span class="pnl-value neutral" id="netPnlValue">0.00</span>
        </div>
    </div>

    <div class="status-bar" id="statusBar">等待下一次刷新...</div>
</div>

<script>
    // 接口配置
    const API_ZHESHANG = '/api/gold'; // 走 vercel.json 代理
    const API_LONDON = '/api/london'; // 走 api/london.js 云函数
    let latestPriceNum = 0;

    // --- 辅助函数 ---
    function getColorClass(value) {
        const num = parseFloat(String(value).replace('+', ''));
        if (isNaN(num) || num === 0) return 'neutral';
        return num > 0 ? 'up' : 'down';
    }

    // --- 获取并渲染伦敦金 ---
    async function fetchLondonGold() {
        try {
            // 直接请求我们在 Vercel 部署的 Serverless 函数
            const response = await fetch(API_LONDON);
            if (!response.ok) throw new Error('伦敦金网络异常');
            
            const json = await response.json();
            const data = json?.data?.goldQuoteVos?.[1]; 
            
            if (data) {
                document.getElementById('lgName').innerText = data.name;
                
                const priceEl = document.getElementById('lgPrice');
                const changeEl = document.getElementById('lgChange');
                
                priceEl.innerText = data.lastPriceText;
                changeEl.innerText = `${data.raiseText} (${data.raisePercent100})`;
                
                const colorClass = getColorClass(data.raiseText);
                priceEl.className = `lg-price ${colorClass}`;
                changeEl.className = `lg-change ${colorClass}`;
            } else {
                throw new Error('返回数据格式异常或 Cookie 失效');
            }
        } catch (error) {
            console.error('获取伦敦金失败:', error);
            document.getElementById('lgName').innerText = "伦敦金 (暂无数据)";
            document.getElementById('lgPrice').className = "lg-price neutral";
            document.getElementById('lgPrice').innerText = "--";
            document.getElementById('lgChange').innerText = "请检查接口状态";
        }
    }

    // --- 获取并渲染浙商金 ---
    function parseZheshangData(text) {
        const extract = (keyword) => {
            const regex = new RegExp(`${keyword}:\\s*([-\\d.]+)`);
            const match = text.match(regex);
            return match ? match[1] : '--';
        };
        const timeRegex = /更新时间:\s*([\d-]+[\s\d:]+)/;
        const timeMatch = text.match(timeRegex);

        return {
            price: extract('最新价格'),
            change: extract('涨跌额'),
            changePercent: text.match(/涨跌幅:\s*([-\d.]+%)|$/)[1] || '--',
            open: extract('开盘价'),
            high: extract('最高价'),
            low: extract('最低价'),
            prevClose: extract('前收盘价'),
            updateTime: timeMatch ? timeMatch[1] : new Date().toLocaleTimeString()
        };
    }

    async function fetchZheshangGold() {
        const statusEl = document.getElementById('statusBar');
        statusEl.innerText = "正在同步最新数据...";
        
        try {
            const response = await fetch(API_ZHESHANG);
            if (!response.ok) throw new Error('浙商金网络异常');
            
            const text = await response.text(); 
            const data = parseZheshangData(text);
            
            if (data.price !== '--') {
                latestPriceNum = parseFloat(data.price);
                
                const priceEl = document.getElementById('currentPrice');
                const changeEl = document.getElementById('priceChange');

                priceEl.innerText = data.price;
                changeEl.innerText = `${data.change > 0 ? '+' : ''}${data.change} (${data.changePercent})`;

                const colorClass = getColorClass(data.change);
                priceEl.className = `current-price ${colorClass}`;
                changeEl.className = `price-change ${colorClass}`;

                document.getElementById('openPrice').innerText = data.open;
                document.getElementById('highPrice').innerText = data.high;
                document.getElementById('lowPrice').innerText = data.low;
                document.getElementById('prevClose').innerText = data.prevClose;
                document.getElementById('updateTime').innerText = `更新时间: ${data.updateTime}`;
                
                calculatePnL();
                statusEl.innerText = "数据已更新";
            } else {
                throw new Error('解析失败');
            }
        } catch (error) {
            console.error('获取浙商金失败:', error);
            statusEl.innerText = `同步中断，等待重试 (${new Date().toLocaleTimeString()})`;
        }
    }

    // --- 盈亏计算与本地存储 ---
    window.calculatePnL = function() {
        const buyPriceEl = document.getElementById('buyPrice');
        const holdAmountEl = document.getElementById('holdAmount');
        
        const buyPrice = parseFloat(buyPriceEl.value);
        const holdAmount = parseFloat(holdAmountEl.value);

        // 保存到本地浏览器缓存
        localStorage.setItem('savedBuyPrice', buyPriceEl.value);
        localStorage.setItem('savedHoldAmount', holdAmountEl.value);
        
        const grossPnlEl = document.getElementById('grossPnl');
        const feeEl = document.getElementById('feeValue');
        const netPnlEl = document.getElementById('netPnlValue');

        if (!isNaN(buyPrice) && !isNaN(holdAmount) && latestPriceNum > 0) {
            const grossPnl = (latestPriceNum - buyPrice) * holdAmount;
            const fee = latestPriceNum * 0.004 * holdAmount;
            const netPnl = grossPnl - fee;

            grossPnlEl.innerText = (grossPnl > 0 ? '+' : '') + grossPnl.toFixed(2);
            grossPnlEl.className = getColorClass(grossPnl);
            feeEl.innerText = '-' + fee.toFixed(2);
            netPnlEl.innerText = (netPnl > 0 ? '+' : '') + netPnl.toFixed(2);
            netPnlEl.className = `pnl-value ${getColorClass(netPnl)}`;
        } else {
            grossPnlEl.innerText = "0.00";
            grossPnlEl.className = "neutral";
            feeEl.innerText = "0.00";
            netPnlEl.innerText = "0.00";
            netPnlEl.className = "pnl-value neutral";
        }
    };

    // --- 初始化 ---
    function init() {
        // 读取本地缓存的买入价和持仓量
        const savedBuyPrice = localStorage.getItem('savedBuyPrice');
        const savedHoldAmount = localStorage.getItem('savedHoldAmount');
        
        if (savedBuyPrice) document.getElementById('buyPrice').value = savedBuyPrice;
        if (savedHoldAmount) document.getElementById('holdAmount').value = savedHoldAmount;

        // 首次加载数据
        fetchLondonGold();
        fetchZheshangGold();

        // 设定定时器：每30秒同时刷新大盘和积存金
        setInterval(() => {
            fetchLondonGold();
            fetchZheshangGold();
        }, 30000);
    }

    init();
</script>
</body>
</html>
